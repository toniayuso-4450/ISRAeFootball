services:
  - type: web
    name: f-tbol
    runtime: python
    branch: main
    autoDeploy: yes
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
