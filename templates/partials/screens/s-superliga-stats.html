<div class="screen" id="s-superliga-stats">
<button class="back-btn" onclick="go('s-superliga')">◀ Volver</button>
<div class="sec-hdr"><span class="sec-emoji">📈</span><h2>Superliga · Estadísticas</h2></div>
<style>
  /* Reusa la misma paleta que s-liga-stats. CSS duplicado a propósito
     para que el screen sea autocontenido (no depende de que s-liga-stats
     se haya cargado antes). */
  #s-superliga-stats .liga-stats-wrap{padding:0 18px 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
  #s-superliga-stats .liga-stat-card{background:linear-gradient(180deg,#101622 0%,#0b1018 100%);border:1px solid rgba(168,85,247,.22);border-radius:10px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.35);}
  #s-superliga-stats .liga-stat-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(90deg,#2a0f4a,#5a2890);border-bottom:1px solid rgba(168,85,247,.30);}
  #s-superliga-stats .liga-stat-ico{font-size:20px;line-height:1;}
  #s-superliga-stats .liga-stat-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;font-weight:700;}
  #s-superliga-stats .liga-stat-body{padding:8px 10px 10px;}
  #s-superliga-stats .liga-stat-row{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;padding:9px 6px;border-bottom:1px solid rgba(255,255,255,.05);}
  #s-superliga-stats .liga-stat-row:last-child{border-bottom:none;}
  #s-superliga-stats .liga-stat-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(168,85,247,.95);text-align:center;}
  #s-superliga-stats .liga-stat-player{min-width:0;display:flex;flex-direction:column;gap:2px;}
  #s-superliga-stats .liga-stat-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #s-superliga-stats .liga-stat-team{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.4px;color:rgba(255,255,255,.45);text-transform:uppercase;}
  #s-superliga-stats .liga-stat-value{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#c084fc;min-width:34px;text-align:right;letter-spacing:1px;}
  #s-superliga-stats .liga-stat-empty{padding:16px 10px;text-align:center;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.28);}
  #s-superliga-stats .liga-stat-more{margin-top:8px;border-top:1px solid rgba(255,255,255,.06);}
  #s-superliga-stats .liga-stat-more summary{list-style:none;cursor:pointer;padding:10px 6px 4px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.8px;color:rgba(168,85,247,.9);text-transform:uppercase;}
  #s-superliga-stats .liga-stat-more summary::-webkit-details-marker{display:none;}
  #s-superliga-stats .liga-stat-more-list{margin-top:4px;border-top:1px solid rgba(255,255,255,.04);}
  #s-superliga-stats .liga-stat-more .liga-stat-row{padding-top:8px;padding-bottom:8px;}
</style>
<div class="liga-stats-wrap" id="superliga-stats-dashboard">
<div class="liga-stat-empty">Calculando estadísticas...</div>
</div>
<script>
(function(){
  /* Repinta el dashboard cada vez que se entra a la pantalla.
     Los caches `ef_player_stats_superliga_v1` los rellena
     `rebuildPlayerStatsStore` (misc_body_1.html) en cada partido /
     simulación. Aquí solo leemos. */
  function _renderSuperligaStats(){
    if (typeof window._lextBuildCompStatsDashboard === 'function') {
      window._lextBuildCompStatsDashboard('superliga-stats-dashboard', 'ef_player_stats_superliga_v1');
    }
  }
  window._renderSuperligaStats = _renderSuperligaStats;
  document.addEventListener('DOMContentLoaded', _renderSuperligaStats);
  /* Repintar al hacer `go('s-superliga-stats')` — el sistema de
     navegación dispara el evento 'screen-shown' o similar; si no
     existe, observamos el cambio de display via MutationObserver. */
  try {
    var el = document.getElementById('s-superliga-stats');
    if (el && typeof MutationObserver !== 'undefined') {
      var mo = new MutationObserver(function(mutations){
        for (var i = 0; i < mutations.length; i++) {
          var m = mutations[i];
          if (m.type === 'attributes' && (m.attributeName === 'class' || m.attributeName === 'style')) {
            if (el.classList && el.classList.contains('active')) _renderSuperligaStats();
          }
        }
      });
      mo.observe(el, { attributes:true });
    }
  } catch(_){}
})();
</script>
</div>
