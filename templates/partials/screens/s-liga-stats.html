<div class="screen" id="s-liga-stats">
<button class="back-btn" onclick="go('s-liga')">◀ Volver</button>
<div class="sec-hdr"><span class="sec-emoji">📈</span><h2>Liga EA Sports · Estadísticas</h2></div>
<style>
  .liga-stats-wrap{padding:0 18px 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
  .liga-stat-card{background:linear-gradient(180deg,#101622 0%,#0b1018 100%);border:1px solid rgba(240,192,64,.18);border-radius:10px;overflow:hidden;box-shadow:0 4px 18px rgba(0,0,0,.35);}
  .liga-stat-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(90deg,#082a14,#0f5a28);border-bottom:1px solid rgba(240,192,64,.22);}
  .liga-stat-ico{font-size:20px;line-height:1;}
  .liga-stat-title{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:1.5px;color:#fff;text-transform:uppercase;font-weight:700;}
  .liga-stat-body{padding:8px 10px 10px;}
  .liga-stat-row{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:center;padding:9px 6px;border-bottom:1px solid rgba(255,255,255,.05);}
  .liga-stat-row:last-child{border-bottom:none;}
  .liga-stat-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:rgba(240,192,64,.9);text-align:center;}
  .liga-stat-player{min-width:0;display:flex;flex-direction:column;gap:2px;}
  .liga-stat-name{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .liga-stat-team{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:1.4px;color:rgba(255,255,255,.45);text-transform:uppercase;}
  .liga-stat-value{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#f0c040;min-width:34px;text-align:right;letter-spacing:1px;}
  .liga-stat-empty{padding:16px 10px;text-align:center;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.28);}.liga-stat-more{margin-top:8px;border-top:1px solid rgba(255,255,255,.06);}.liga-stat-more summary{list-style:none;cursor:pointer;padding:10px 6px 4px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.8px;color:rgba(240,192,64,.85);text-transform:uppercase;}.liga-stat-more summary::-webkit-details-marker{display:none;}.liga-stat-more-list{margin-top:4px;border-top:1px solid rgba(255,255,255,.04);}.liga-stat-more .liga-stat-row{padding-top:8px;padding-bottom:8px;}
</style>
<div class="liga-stats-wrap" id="liga-stats-dashboard">
<div class="liga-stat-empty">Calculando estadísticas...</div>
</div>
</div>
