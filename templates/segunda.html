    <style>
        body{margin:0;background:radial-gradient(circle at top left,rgba(240,192,64,.08),transparent 30%),linear-gradient(90deg,#05070b 0%,#070b13 40%,#040914 100%);color:#fff;font-family:Rajdhani,sans-serif;min-height:100vh}
