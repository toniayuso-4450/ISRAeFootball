<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>eFootball - Calendario</title>
    <style>
        body { background: #050505; color: white; font-family: sans-serif; padding: 20px; }
        .jornada-header { background: #1b5e20; padding: 12px; margin-top: 15px; border-radius: 4px; font-weight: bold; cursor: pointer; display: block; }
        .partido-fila { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px; border-bottom: 1px solid #222; }
        .equipo { width: 35%; font-weight: bold; }
        .form-goles { background: #1a1a1a; padding: 10px; display: flex; justify-content: center; gap: 10px; border-bottom: 2px solid #333; }
        input[type="number"] { width: 50px; text-align: center; background: #000; color: #ccff00; border: 1px solid #444; }
        .btn-guardar { background: #e67e22; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
        .nav-link { color: #ccff00; text-decoration: none; border: 1px solid #ccff00; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <a href="/" aria-label="Ir al inicio" style="position:fixed;top:10px;left:50%;transform:translateX(-50%);width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#111;border:1px solid #f0c040;border-radius:8px;color:#fff;text-decoration:none;z-index:5000;box-shadow:0 4px 12px rgba(0,0,0,.35);">🏠</a>

    <h1>📅 CALENDARIO DE LA LIGA</h1>
    <a href="/clasificacion" class="nav-link">📊 VER TABLA DE POSICIONES</a>

    {% for partidos in jornadas %}
    <details>
        <summary class="jornada-header">🟢 Jornada {{ loop.index }}</summary>
        {% for local, visitante in partidos %}
        <div class="partido-fila">
            <div class="equipo">{{ local }}</div>
            <div style="color: #666;">VS</div>
            <div class="equipo" style="text-align:right;">{{ visitante }}</div>
        </div>
        <div class="form-goles">
            <form action="/anotar" method="POST">
                <input type="hidden" name="jornada" value="{{ loop.parent.index }}">
                <input type="hidden" name="local" value="{{ local }}">
                <input type="hidden" name="visitante" value="{{ visitante }}">
                <input type="number" name="goles_l" placeholder="0" required>
                <span>-</span>
                <input type="number" name="goles_v" placeholder="0" required>
                <button type="submit" class="btn-guardar">GUARDAR RESULTADO</button>
            </form>
        </div>
        {% endfor %}
    </details>
    {% endfor %}
</body>
</html>
